basePath: /api/v1
definitions:
  github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse:
    properties:
      error:
        example: full error text
        type: string
      msg:
        example: short message about error
        type: string
    type: object
  internal_features_statistics_transport_http.GetStatisticsResponse:
    properties:
      задач_выполнено:
        example: 10
        type: integer
      задач_создано:
        example: 50
        type: integer
      процент_выполненых_задач:
        example: 20
        type: number
      среднее_время_выполнения:
        example: 1m30s
        type: string
    type: object
  internal_features_tasks_transport_http.CreateTaskRequest:
    properties:
      author_user_id:
        type: integer
      description:
        maxLength: 1000
        minLength: 1
        type: string
      title:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - author_user_id
    - title
    type: object
  internal_features_tasks_transport_http.CreateTaskResponse:
    properties:
      author_user_id:
        type: integer
      completed:
        type: boolean
      completed_at:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      title:
        type: string
      version:
        type: integer
    type: object
  internal_features_tasks_transport_http.GetTaskResponse:
    properties:
