host: 127.0.0.1:5050
info:
  contact: {}
  description: REST-API schema
  title: ToDoApp
  version: "1.0"
paths:
  /statistics:
    get:
      parameters:
      - description: Фильтрация статистики по конкретному пользователю
        in: query
        name: user_id
        type: integer
      - description: Начало промежутка рассмотрения статистики
        in: query
        name: from
        type: string
      - description: Конец промежутка рассмотрения статистики
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение статистики
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.GetStatisticsResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Получение статистики по задачам
      tags:
      - statistics
  /tasks:
    get:
      parameters:
      - description: Фильтрация задач по id автора
        in: query
        name: user_id
        type: integer
      - description: Размер страницы с задачами
        in: query
        name: limit
        type: integer
      - description: Смещение страницы с задачами
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список задач
          schema:
            items:
              $ref: '#/definitions/internal_features_tasks_transport_http.TaskDTOResponse'
            type: array
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Список всех задач
      tags:
      - tasks
    post:
      consumes:
      - application/json
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: успешно созданная задача
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: not found
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Создать задачу
      tags:
      - tasks
  /tasks/{id}:
    delete:
      parameters:
      - description: ID удаляемой задачи
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление задачи
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: task not found
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Удаление задачи
      tags:
      - tasks
    get:
      parameters:
      - description: ID получаемой задачи
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Задача успешно найдена
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.GetTaskResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: task not found
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Получить конкретную задачу
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: |-
        ### Логика обновления полей (логика трёх состояний):
        1. Поле не передано: `description` игнорируется и не меняется значение в БД
        2. Явно передано значение: `"description": "сделать домашку в 12:00"` - устанавливается описание в БД
        3. Передан null: `"description": null` - очищается поле в БД
        Ограничения: `title` и `completed` не могут быть null
      parameters:
      - description: ID изменяемой задачи
        in: path
        name: id
        required: true
        type: integer
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.PatchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешно измененная задача
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.PatchUserResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: conflict
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Обновить задачу
      tags:
      - tasks
  /users:
    get:
      parameters:
      - description: Размер страницы с пользователями
        in: query
        name: limit
        type: integer
      - description: Смещение страницы с пользователями
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение списка пользователей
          schema:
            items:
              $ref: '#/definitions/internal_features_users_transport_http.UserDTOResponse'
            type: array
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Список всех существующих пользователей
      tags:
      - users
    post:
      consumes:
      - application/json
      parameters:
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: statusOk
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.CreateUserResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Создать пользователя
      tags:
      - users
  /users/{id}:
    delete:
      parameters:
      - description: ID удаляемого пользователя
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: Успешное удаление пользователя
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Удаление пользователя
      tags:
      - users
    get:
      parameters:
      - description: ID получаемого пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь успешно найден
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.GetUserResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Получить конкретного пользователя
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: |-
        ### Логика обновления полей (логика трёх состояний):
        1. Поле не передано: `phone_number` игнорируется и не меняется значение в БД
        2. Явно передано значение: `"phone_number": "+79990000000"` - устанавливается новый номер в БД
        3. Передан null: `"phone_number": null` - очищается поле в БД
        Ограничения: `full_name` не может быть выставлено как null
      parameters:
      - description: ID изменяемого пользователя
        in: path
        name: id
        required: true
        type: integer
      - description: тело запроса
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.PatchUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешное изменение пользователя
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.PatchUserResponse'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: user not found
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: conflict
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: server error
          schema:
            $ref: '#/definitions/github_com_Hardbane_todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Изменение пользователя
      tags:
      - users
